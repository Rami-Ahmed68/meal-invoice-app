<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>غير متصل بالإنترنت</title>
    <style>
      body {
        font-family: "Cairo", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f5f5f5;
        text-align: center;
      }
      .container {
        background: white;
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #e53e3e;
      }
      p {
        color: #4a5568;
      }
      button {
        background: #3182ce;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        margin-top: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>⚠️ لا يوجد اتصال بالإنترنت</h1>
      <p>يرجى التحقق من اتصالك بالشبكة ثم حاول مرة أخرى.</p>
      <button onclick="window.location.reload()">إعادة المحاولة</button>
    </div>
  </body>
</html>
